<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舆情监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 陶土风配色方案 */
            --terracotta: #E07A5F;        /* 主色：陶土橙 */
            --terracotta-dark: #C96B52;   /* 深陶土色 */
            --charcoal: #2D2D2D;          /* 炭黑色：描边/文字 */
            --cream: #FDFBF7;             /* 奶油色：背景 */
            --off-white: #F8F5F0;         /* 米白色 */
            --soft-blue: #B8C5D6;         /* 点缀：浅蓝 */
            --soft-pink: #E8C5C5;         /* 点缀：柔粉 */
            --accent-green: #6B9080;      /* 辅助绿 */
            --accent-yellow: #F4D38C;     /* 辅助黄 */
            --border-thick: 2.5px solid var(--charcoal);
            --border-rounded: 12px;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at 20% 30%, var(--soft-blue) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, var(--soft-pink) 0%, transparent 50%),
                linear-gradient(180deg, var(--cream) 0%, var(--off-white) 100%);
            min-height: 100vh;
            padding: 24px;
            color: var(--charcoal);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 手绘风格装饰点阵背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(var(--charcoal) 1px, transparent 1px),
                radial-gradient(var(--charcoal) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 手绘风格卡片通用样式 */
        .controls, .channel-card, .ai-analysis, .analysis-card {
            background: #fff;
            border: var(--border-thick);
            border-radius: var(--border-rounded);
            box-shadow: 4px 4px 0 var(--charcoal);
            transition: all 0.2s ease;
        }

        .controls:hover, .channel-card:hover, .analysis-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--charcoal);
        }

        .controls {
            padding: 24px;
            margin-bottom: 24px;
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: var(--off-white);
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--charcoal);
            transition: all 0.2s;
            font-weight: 500;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--terracotta);
            background: #fff;
            box-shadow: 3px 3px 0 var(--terracotta);
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        /* 手绘风格按钮 */
        button {
            padding: 12px 24px;
            background: var(--terracotta);
            color: #fff;
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 3px 3px 0 var(--charcoal);
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }

        button:hover {
            background: var(--terracotta-dark);
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 var(--charcoal);
        }

        button:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--charcoal);
        }

        .refresh-btn {
            background: var(--accent-green);
        }

        .refresh-btn:hover {
            background: #5A7D6E;
        }

        /* 筛选按钮 */
        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--off-white);
            color: var(--charcoal);
            font-size: 13px;
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .filter-btn.active {
            background: var(--terracotta);
            color: #fff;
            border-color: var(--charcoal);
        }

        .filter-btn:hover:not(.active) {
            background: var(--soft-blue);
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--charcoal);
        }

        /* 翻译开关 */
        .translate-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            background: var(--off-white);
            padding: 8px 12px;
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .translate-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--terracotta);
        }

        .translate-toggle label {
            font-size: 13px;
            color: var(--charcoal);
            font-weight: 600;
            cursor: pointer;
        }

        /* 新闻卡片 */
        .channel-card {
            padding: 0;
            display: flex;
            flex-direction: column;
            max-height: 70vh;
            overflow: hidden;
        }

        .channel-header {
            background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-dark) 100%);
            color: #fff;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--charcoal);
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
        }

        .channel-count {
            background: #fff;
            color: var(--terracotta);
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid var(--charcoal);
            border-radius: 12px;
        }

        /* 新闻列表 */
        .channel-news-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow-y: auto;
            flex: 1;
            padding: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 39px,
                rgba(0,0,0,0.02) 40px
            );
        }

        .news-item {
            background: #fff;
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            padding: 12px 16px;
            margin: 8px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-item:hover {
            border-color: var(--terracotta);
            box-shadow: 3px 3px 0 var(--terracotta);
            transform: translate(-1px, -1px);
        }

        .news-item-content {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }

        .news-item-title {
            flex: 1 1 auto;
            min-width: 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--charcoal);
            text-decoration: none;
            transition: color 0.2s;
            line-height: 1.5;
            word-break: break-word;
        }

        .news-item-title:hover {
            color: var(--terracotta);
        }

        /* 情感徽章 - 手绘风格 */
        .sentiment-badge {
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            border: 2px solid var(--charcoal);
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .sentiment-positive {
            background: #86C29A;
            color: #1a4d3a;
        }

        .sentiment-negative {
            background: #E88D8D;
            color: #5c2a2a;
        }

        .sentiment-neutral {
            background: var(--accent-yellow);
            color: #5c4a2a;
        }

        .trans-badge {
            background: var(--accent-yellow);
            color: #5c4a2a;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 6px;
            border: 2px solid var(--charcoal);
        }

        .news-item-meta {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
        }

        .news-item-date {
            font-size: 11px;
            color: #888;
            font-weight: 500;
        }

        /* 加载动画 */
        .loading::before {
            content: '';
            display: block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--charcoal);
            border-top-color: var(--terracotta);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 1s linear infinite;
            background: var(--accent-yellow);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 无数据状态 */
        .no-data {
            text-align: center;
            padding: 60px 20px;
            background: var(--off-white);
            border: 2px dashed var(--charcoal);
            color: #888;
            border-radius: var(--border-rounded);
        }

        .no-data h3 {
            color: var(--charcoal);
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 700;
        }

        /* AI 分析模块 */
        .ai-analysis {
            padding: 24px;
            margin-bottom: 24px;
        }

        .ai-analysis h3 {
            color: var(--charcoal);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
        }

        .ai-analysis-content {
            color: var(--charcoal);
            line-height: 1.8;
            font-size: 14px;
        }

        .ai-analysis-report .analysis-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--charcoal);
        }

        .ai-analysis-report h4 {
            color: var(--terracotta);
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .executive-summary {
            background: var(--accent-yellow);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--charcoal);
            font-weight: 600;
            color: var(--charcoal);
            font-size: 14px;
        }

        /* 关键词云图 */
        .word-cloud-container {
            width: 100%;
            height: 140px;
            position: relative;
            background: var(--off-white);
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            padding: 12px;
            overflow: hidden;
        }

        .word-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 6px;
            height: 100%;
            overflow: hidden;
        }

        .word-tag {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
            border: 2px solid var(--charcoal);
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .word-tag:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--charcoal);
        }

        /* SVG 图标容器 */
        .icon {
            width: 24px;
            height: 24px;
            display: inline-block;
            vertical-align: middle;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* 状态栏 */
        .status-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            border: var(--border-thick);
            border-radius: var(--border-rounded);
            padding: 15px 20px;
            box-shadow: 4px 4px 0 var(--charcoal);
            z-index: 1000;
            min-width: 220px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .status-item:last-child { margin-bottom: 0; }

        .status-label {
            color: #666;
            font-size: 11px;
            font-weight: 600;
        }

        .status-value {
            color: var(--charcoal);
            font-weight: 700;
        }

        .refresh-countdown {
            color: var(--accent-green);
            font-size: 16px;
            font-weight: 700;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            border: 2px solid var(--charcoal);
            display: inline-block;
            margin-right: 6px;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 分析卡片新布局 */
        .analysis-modules-new {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .analysis-modules-new > .full-width {
            grid-column: span 3;
        }

        @media (max-width: 1200px) {
            .analysis-modules-new {
                grid-template-columns: 1fr;
            }
            .analysis-modules-new > .full-width {
                grid-column: span 1;
            }
        }

        /* 兴趣管理器 */
        .interest-manager {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid var(--charcoal);
        }

        .category-chip {
            padding: 8px 12px;
            background: var(--off-white);
            border: 2px solid var(--charcoal);
            border-radius: 8px;
            font-size: 13px;
            color: var(--charcoal);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 600;
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .category-chip:hover {
            background: var(--accent-yellow);
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--charcoal);
        }

        .category-chip.selected {
            background: var(--terracotta);
            border-color: var(--charcoal);
            color: #fff;
        }

        .interest-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--accent-yellow);
            border: 2px solid var(--charcoal);
            border-radius: 12px;
            font-size: 12px;
            color: var(--charcoal);
            margin-right: 6px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .interest-tag .remove-btn {
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .interest-tag .remove-btn:hover {
            color: #cf222e;
        }

        .btn-outline {
            background: var(--off-white);
            border: 2px solid var(--charcoal);
            color: var(--charcoal);
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .btn-outline:hover {
            background: #ffebee;
            border-color: #cf222e;
            color: #cf222e;
        }

        /* 推荐列表 */
        .recommend-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .recommend-item {
            background: var(--off-white);
            border: 2px solid var(--charcoal);
            padding: 12px;
            transition: all 0.2s;
            border-radius: 8px;
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .recommend-item:hover {
            border-color: var(--terracotta);
            background: #fff;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--charcoal);
        }

        .recommend-title-link {
            color: var(--charcoal);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .recommend-title-link:hover {
            color: var(--terracotta);
        }

        .recommend-score {
            background: var(--terracotta);
            color: #fff;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 6px;
            border: 2px solid var(--charcoal);
        }

        .recommend-reason {
            color: #666;
            font-size: 12px;
        }

        /* 社交指标 */
        .social-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .social-metric {
            background: var(--off-white);
            border: 2px solid var(--charcoal);
            padding: 14px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.2s;
            box-shadow: 2px 2px 0 var(--charcoal);
        }

        .social-metric:hover {
            border-color: var(--terracotta);
            background: #fff;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 var(--charcoal);
        }

        .metric-value {
            color: var(--terracotta);
            font-size: 28px;
            font-weight: 700;
        }

        .metric-label {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* 兴趣条 */
        .interest-bar {
            height: 16px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
            transition: width 0.6s ease;
            border: 2px solid var(--charcoal);
        }

        .interest-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .interest-bar-fill.high { background: var(--accent-green); }
        .interest-bar-fill.medium { background: var(--accent-yellow); }
        .interest-bar-fill.low { background: var(--terracotta); }

        .interest-bar-text {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: 700;
            color: var(--charcoal);
            white-space: nowrap;
        }

        /* AI 加载状态 */
        .ai-loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--charcoal);
            padding: 20px;
            font-weight: 600;
        }

        .ai-loading::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 3px solid var(--charcoal);
            border-top-color: var(--terracotta);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .ai-error {
            background: #ffebee;
            border: 2px solid var(--charcoal);
            color: #cf222e;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }

            .filter-buttons {
                justify-content: center;
            }

            .translate-toggle {
                margin-left: 0;
                justify-content: center;
                width: 100%;
            }
        }

        @media (min-width: 769px) and (max-width: 1200px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Toast 提示 */
        .toast {
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 0);
                opacity: 1;
            }
            to {
                transform: translate(-50%, -100%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 状态显示栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span class="status-label"><span class="status-dot"></span>自动刷新</span>
            <span class="refresh-countdown" id="countdown">30:00</span>
        </div>
        <div class="status-item">
            <span class="status-label">最后更新</span>
            <span class="last-update" id="last-update">--:--:--</span>
        </div>
    </div>

    <div class="container">
        <!-- 1. 顶部：AI 智能分析 -->
        <div id="ai-analysis" class="ai-analysis" style="display: none; margin-bottom: 25px;">
            <h3>
                <svg class="icon" viewBox="0 0 24 24" style="color: var(--terracotta);">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-4.5V6h4v6.5c0 1.33-1 2.5-2.5 2.5S9 13.83 9 12.5V11h2v1.5c0 .28.22.5.5.5s.5-.22.5-.5V8h-2v2.5z" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                AI 智能分析
            </h3>
            <div class="ai-analysis-content" id="ai-content"></div>
        </div>

        <!-- 2. 关键词云图（全宽） -->
        <div class="analysis-card keyword-analysis full-width" id="keyword-analysis" style="display: none;">
            <h3 style="color: var(--charcoal); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-weight: 700;">
                <svg class="icon" viewBox="0 0 24 24" style="color: var(--terracotta);">
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="6" cy="8" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="18" cy="8" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="6" cy="16" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="18" cy="16" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M9 10L11 12L9 14M15 10L13 12L15 14" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                关键词云图
            </h3>
            <div class="word-cloud-container">
                <div class="word-cloud" id="word-cloud-content"></div>
            </div>
        </div>

        <!-- 3. 三列分析模块 -->
        <div class="analysis-modules-new">
            <!-- 兴趣匹配分析 -->
            <div class="analysis-card interest-analysis" id="interest-analysis" style="display: none;">
                <h3 style="color: var(--charcoal); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-weight: 700;">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--terracotta);">
                        <path d="M12 2L15 8L21 9L17 14L18 20L12 17L6 20L7 14L3 9L9 8L12 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                    兴趣匹配分析
                </h3>
                <div class="analysis-card-content" id="interest-content"></div>
                <div class="interest-manager" id="interest-manager" style="display: none;">
                    <p style="color: #666; font-size: 13px; margin-bottom: 12px; font-weight: 600;">选择您关注的行业领域，系统将为您筛选相关新闻：</p>
                    <div class="interest-categories" id="interest-categories"></div>
                    <div class="my-interests">
                        <div class="my-interests-title" style="font-size: 12px; font-weight: 700; color: var(--charcoal); margin-bottom: 8px;">已选领域</div>
                        <div id="my-interests-list"></div>
                    </div>
                    <div class="interest-actions" style="display: flex; gap: 8px; margin-top: 10px;">
                        <button class="btn-outline" onclick="toggleInterestManager()">收起</button>
                    </div>
                </div>
            </div>

            <!-- AI 推荐 -->
            <div class="analysis-card ai-recommend" id="ai-recommend" style="display: none;">
                <h3 style="color: var(--charcoal); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-weight: 700;">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--terracotta);">
                        <path d="M12 3L14 8L19 9L15 13L16 18L12 15L8 18L9 13L5 9L10 8L12 3Z" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                    AI 推荐
                </h3>
                <div class="analysis-card-content" id="recommend-content"></div>
            </div>

            <!-- 社交分析 -->
            <div class="analysis-card social-analysis" id="social-analysis" style="display: none;">
                <h3 style="color: var(--charcoal); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-weight: 700;">
                    <svg class="icon" viewBox="0 0 24 24" style="color: var(--terracotta);">
                        <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="18" cy="6" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M9 12H15M16 8L17 9M16 16L17 15" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                    社交分析
                </h3>
                <div class="analysis-card-content" id="social-content"></div>
            </div>
        </div>

        <!-- 4. 搜索和控制栏 -->
        <div class="controls" style="margin-bottom: 25px;">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 搜索关键词，例如：AI、智能手机、新能源汽车...">
                <button onclick="searchNews()">🔍 搜索</button>
                <button class="refresh-btn" onclick="loadNews()">🔄 刷新</button>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterSentiment('all', this)">全部</button>
                <button class="filter-btn" onclick="filterSentiment('positive', this)">正面</button>
                <button class="filter-btn" onclick="filterSentiment('neutral', this)">中性</button>
                <button class="filter-btn" onclick="filterSentiment('negative', this)">负面</button>
                <div class="translate-toggle">
                    <input type="checkbox" id="translate-toggle" checked onchange="toggleTranslation()">
                    <label for="translate-toggle">🌐 自动翻译英文</label>
                </div>
            </div>
        </div>

        <!-- 5. 底部：聚合资讯 -->
        <div id="news-container" class="news-grid">
            <div class="loading">正在加载新闻数据...</div>
        </div>
    </div>

    <script>
        let allNews = [];
        let currentFilter = 'all';
        let showTranslation = true;
        let userKeywords = [];
        let userHistory = [];
        const USER_ID = 'default';
        let presetCategories = {};
        let selectedCategory = null;

        // 兴趣管理器显示控制
        function toggleInterestManager() {
            const manager = document.getElementById('interest-manager');
            const isExpanding = manager.style.display !== 'block';
            manager.style.display = isExpanding ? 'block' : 'none';

            if (!isExpanding) {
                refreshInterestAnalysisCard();
            }
        }

        // 页面加载时获取用户兴趣
        async function loadUserInterests() {
            try {
                const response = await fetch(`/api/user/interests?user_id=${USER_ID}`);
                if (response.ok) {
                    const result = await response.json();
                    userKeywords = result.interests.map(i => i.keyword) || [];
                    console.log('用户兴趣：', userKeywords);

                    if (userKeywords.length === 0) {
                        console.log('暂无关注领域，等待用户选择领域');
                    }
                }
            } catch (error) {
                console.error('加载用户兴趣失败:', error);
            }
        }

        // 加载预设兴趣分类
        async function loadPresetCategories() {
            try {
                const response = await fetch('/api/user/interests/categories');
                if (response.ok) {
                    const result = await response.json();
                    presetCategories = result.categories || {};
                    renderPresetCategories();
                }
            } catch (error) {
                console.error('加载预设分类失败:', error);
            }
        }

        // 渲染预设分类
        function renderPresetCategories() {
            const container = document.getElementById('interest-categories');
            if (!container) return;

            let html = '';
            for (const [category, keywords] of Object.entries(presetCategories)) {
                const isSelected = selectedCategory === category ? 'selected' : '';
                html += `<span class="category-chip ${isSelected}" onclick="selectCategory('${category}')">${category}</span>`;
            }
            container.innerHTML = html;
        }

        // 选中分类
        async function selectCategory(categoryName) {
            if (selectedCategory === categoryName) {
                await unfollowCategory(categoryName);
                selectedCategory = null;
            } else {
                if (selectedCategory) {
                    await unfollowCategory(selectedCategory);
                }
                selectedCategory = categoryName;
                await followCategory(categoryName);
            }
            renderPresetCategories();
            await refreshUserKeywords();
        }

        // 关注分类
        async function followCategory(categoryName) {
            try {
                const response = await fetch('/api/user/interests/follow_category', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        category: categoryName
                    })
                });
                if (response.ok) {
                    const result = await response.json();
                    showToast(`已关注"${categoryName}"领域（${result.keywords_count}个关键词）`, 'success');
                }
            } catch (error) {
                console.error('关注分类失败:', error);
            }
        }

        // 取消关注分类
        async function unfollowCategory(categoryName) {
            try {
                const response = await fetch('/api/user/interests/unfollow_category', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        category: categoryName
                    })
                });
                if (response.ok) {
                    showToast(`已取消关注"${categoryName}"`, 'success');
                }
            } catch (error) {
                console.error('取消关注失败:', error);
            }
        }

        // 添加兴趣
        async function addInterest(keyword) {
            try {
                await fetch('/api/user/interests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        keyword: keyword,
                        weight: 2.0
                    })
                });
            } catch (error) {
                console.error('添加兴趣失败:', error);
            }
        }

        // 删除兴趣
        async function deleteInterest(keyword) {
            try {
                await fetch('/api/user/interests/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        keyword: keyword
                    })
                });
            } catch (error) {
                console.error('删除兴趣失败:', error);
            }
        }

        // 清空所有兴趣
        async function clearAllInterests() {
            if (!confirm('确定要清空所有兴趣标签吗？')) return;

            try {
                await fetch('/api/user/interests/clear', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: USER_ID })
                });
                userKeywords = [];
                renderMyInterests();
                refreshInterestAnalysisCard();
                clearCategorySelection();
                showToast('已清空所有兴趣标签', 'success');
            } catch (error) {
                console.error('清空兴趣失败:', error);
            }
        }

        // 渲染我的兴趣
        function renderMyInterests() {
            const container = document.getElementById('my-interests-list');
            if (!container) return;

            if (userKeywords.length === 0) {
                container.innerHTML = `
                    <p style="color: #666; font-size: 12px; margin-bottom: 8px;">暂无关注领域</p>
                    <p style="color: var(--terracotta); font-size: 11px;">💡 点击上方分类卡片开始关注</p>
                `;
                return;
            }

            let selectedCats = new Set();
            for (const kw of userKeywords) {
                for (const [cat, keywords] of Object.entries(presetCategories)) {
                    if (keywords.includes(kw)) {
                        selectedCats.add(cat);
                        break;
                    }
                }
            }

            let html = '<p style="color: var(--accent-green); font-size: 11px; margin-bottom: 8px;">✅ 已关注领域</p>';
            for (const cat of selectedCats) {
                html += `<span class="interest-tag">${cat} <span class="remove-btn" onclick="unselectCategory('${cat}')">×</span></span>`;
            }
            container.innerHTML = html;
        }

        // 取消选中分类
        async function unselectCategory(categoryName) {
            const keywords = presetCategories[categoryName] || [];
            for (const kw of keywords) {
                if (userKeywords.includes(kw)) {
                    await deleteInterest(kw);
                    userKeywords = userKeywords.filter(k => k !== kw);
                }
            }
            if (selectedCategory === categoryName) {
                selectedCategory = null;
            }
            renderMyInterests();
            renderPresetCategories();
            refreshInterestAnalysisCard();
            showToast(`已取消关注"${categoryName}"`, 'success');
        }

        // 从后端获取最新的用户兴趣标签
        async function refreshUserKeywords() {
            try {
                const response = await fetch(`/api/user/interests?user_id=${USER_ID}`);
                if (response.ok) {
                    const data = await response.json();
                    userKeywords = (data.interests || []).map(i => i.keyword);
                    console.log(`[兴趣更新] 已更新 ${userKeywords.length} 个兴趣标签:`, userKeywords);

                    refreshInterestAnalysisCard();
                    renderMyInterests();
                    updateUserInterestsDisplay();
                }
            } catch (error) {
                console.error('获取兴趣标签失败:', error);
            }
        }

        // 刷新兴趣分析卡片的标签显示
        function refreshInterestAnalysisCard() {
            const interestContent = document.getElementById('interest-content');
            if (!interestContent) return;

            const manager = document.getElementById('interest-manager');
            if (manager && manager.style.display === 'block') {
                return;
            }

            if (userKeywords.length === 0) {
                interestContent.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p style="color: #666; margin-bottom: 10px; font-weight: 600;">暂无关注领域</p>
                        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">选择行业领域，定制您的专属舆情</p>
                        <button onclick="toggleInterestManager()" style="padding: 8px 16px; font-size: 13px;">管理关注领域</button>
                    </div>
                `;
                return;
            }

            let html = '<div style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px;">';
            userKeywords.slice(0, 10).forEach(kw => {
                html += `<span class="word-tag" style="background: var(--terracotta); font-size: 12px;" onclick="searchByKeyword('${kw}')">⭐ ${kw}</span>`;
            });
            if (userKeywords.length > 10) {
                html += `<span class="word-tag" style="background: var(--soft-blue); font-size: 12px;">+${userKeywords.length - 10} 更多</span>`;
            }
            html += '</div>';
            html += '<p style="color: #666; font-size: 12px;">管理面板已收起，点击上方标签可快速搜索 | <a href="javascript:void(0)" onclick="toggleInterestManager()" style="color: var(--terracotta);">展开管理</a></p>';
            interestContent.innerHTML = html;
        }

        // 更新兴趣卡片显示
        function updateUserInterestsDisplay() {
            const interestsEl = document.getElementById('user-interests');
            if (interestsEl && userKeywords.length > 0) {
                interestsEl.innerHTML = userKeywords.map(kw =>
                    `<span class="keyword matched">${kw}</span>`
                ).join('');
            }
        }

        // 显示提示消息
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? 'var(--accent-green)' : 'var(--terracotta)'};
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                border: 2px solid var(--charcoal);
                box-shadow: 3px 3px 0 var(--charcoal);
                z-index: 10000;
                animation: slideDown 0.3s ease;
                font-weight: 600;
            `;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 记录用户点击
        async function recordClick(newsId, title, source) {
            try {
                const response = await fetch('/api/user/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        news_id: newsId,
                        title: title,
                        source: source
                    })
                });

                if (response.ok) {
                    console.log(`[点击记录] 已记录：${title}`);
                    await refreshUserKeywords();
                    if (typeof allNews !== 'undefined' && allNews.length > 0) {
                        generateAIRecommendations(allNews);
                    }
                }
            } catch (err) {
                console.error('记录点击失败:', err);
            }
        }

        // 自动刷新配置
        const AUTO_REFRESH_INTERVAL = 10 * 60 * 1000;
        let refreshCountdown = AUTO_REFRESH_INTERVAL;
        let lastUpdateTime = null;

        // 更新倒计时显示
        function updateCountdown() {
            const minutes = Math.floor(refreshCountdown / 60000);
            const seconds = Math.floor((refreshCountdown % 60000) / 1000);
            const countdownEl = document.getElementById('countdown');
            if (countdownEl) {
                countdownEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            refreshCountdown -= 1000;
            if (refreshCountdown < 0) {
                refreshCountdown = AUTO_REFRESH_INTERVAL;
                console.log('[自动刷新] 倒计时归零，开始刷新新闻数据和分析模块...');
                loadNews();
            }
        }

        // 更新最后更新时间
        function updateLastUpdateTime() {
            lastUpdateTime = new Date();
            const updateEl = document.getElementById('last-update');
            if (updateEl) {
                const hours = lastUpdateTime.getHours().toString().padStart(2, '0');
                const minutes = lastUpdateTime.getMinutes().toString().padStart(2, '0');
                const seconds = lastUpdateTime.getSeconds().toString().padStart(2, '0');
                updateEl.textContent = `${hours}:${minutes}:${seconds}`;
            }
        }

        setInterval(updateCountdown, 1000);

        Promise.all([loadUserInterests(), loadPresetCategories()]).then(() => {
            loadNews();
        });

        async function loadNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading">正在加载新闻数据...</div>';

            try {
                const response = await fetch('/api/news/by-channel');
                const data = await response.json();
                allNews = data;
                renderNewsByChannel(data);

                if (userKeywords.length === 0) {
                    console.log('[兴趣] 新用户，等待选择关注领域');
                }

                triggerAIAnalysis(data);
                updateLastUpdateTime();
                refreshCountdown = AUTO_REFRESH_INTERVAL;
            } catch (error) {
                container.innerHTML = `
                    <div class="no-data">
                        <h3>⚠️ 加载失败</h3>
                        <p>无法连接到服务器，请稍后重试</p>
                        <p style="margin-top: 10px; font-size: 12px;">${error.message}</p>
                    </div>
                `;
            }
        }

        async function triggerAIAnalysis(channels) {
            let allNews = [];
            channels.forEach(([channel, priority, newsItems]) => {
                allNews = allNews.concat(newsItems);
            });

            console.log(`[AI 分析] 共 ${allNews.length} 条新闻，开始触发 4 个分析模块...`);

            if (allNews.length > 0) {
                console.log('[AI 分析] 触发 → 关键词云图');
                analyzeWithAI(allNews);

                console.log('[AI 分析] 触发 → 兴趣匹配分析');
                analyzeKeywords(allNews);

                console.log('[AI 分析] 触发 → 社交分析');
                analyzeSocial(allNews);

                console.log('[AI 分析] 触发 → AI 推荐');
                generateAIRecommendations(allNews);

                console.log('[AI 分析] 4 个分析模块已全部触发');
            } else {
                console.warn('[AI 分析] 没有新闻数据，跳过分析');
            }
        }

        // 关键词分析
        async function analyzeKeywords(newsList) {
            const keywordDiv = document.getElementById('keyword-analysis');
            const wordCloudContent = document.getElementById('word-cloud-content');
            const interestDiv = document.getElementById('interest-analysis');
            const interestContent = document.getElementById('interest-content');

            if (!keywordDiv || !wordCloudContent || !interestDiv || !interestContent) {
                console.warn('[关键词云图] DOM 元素不存在，跳过分析');
                return;
            }

            console.log('[关键词云图] 开始分析...');

            keywordDiv.style.display = 'block';
            wordCloudContent.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100%;color:#666;">正在生成词云...</div>';

            interestDiv.style.display = 'block';
            interestContent.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">正在分析兴趣匹配...</div>';

            try {
                const response = await fetch('/api/analyze/keywords', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ news: newsList.slice(0, 50) })
                });

                console.log(`[关键词云图] API 响应状态：${response.status}`);

                if (response.ok) {
                    const result = await response.json();
                    console.log(`[关键词云图] 获取到 ${result.keywords?.length || 0} 个关键词`);
                    renderWordCloud(result, wordCloudContent);
                    renderInterestAnalysis(result, newsList, interestContent);
                    console.log('[关键词云图] 渲染完成 ✅');
                } else {
                    console.error(`[关键词云图] API 失败：${response.status}`);
                    wordCloudContent.innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">词图生成失败</p>';
                    interestContent.innerHTML = '<p style="color: #999;">分析暂时不可用</p>';
                }
            } catch (error) {
                console.error(`[关键词云图] 请求失败：${error.message}`);
                wordCloudContent.innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">词图生成失败</p>';
                interestContent.innerHTML = '<p style="color: #999;">分析暂时不可用</p>';
            }
        }

        // 渲染词云图
        function renderWordCloud(result, container) {
            const keywords = result.keywords || [];
            const hotTopics = result.hot_topics || [];

            if (keywords.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">暂无关键词数据</p>';
                return;
            }

            const colors = ['var(--terracotta)', 'var(--accent-green)', 'var(--accent-yellow)', 'var(--soft-pink)', '#8B5CF6', '#E07A5F', '#6B9080', '#F4D38C'];
            const sizes = ['16px', '14px', '13px', '13px', '12px', '12px', '12px', '12px'];

            let html = '';
            keywords.slice(0, 20).forEach((kw, index) => {
                const isHot = hotTopics.includes(kw);
                const color = colors[index % colors.length];
                const size = sizes[Math.min(index, sizes.length - 1)];

                html += `
                    <span class="word-tag"
                          style="background: ${color}; font-size: ${size};"
                          onclick="searchByKeyword('${kw}')"
                          title="${isHot ? '🔥 热门话题 ' : ''}点击搜索">
                        ${isHot ? '🔥 ' : ''}${kw}
                    </span>
                `;
            });

            container.innerHTML = html;
        }

        // 渲染兴趣匹配分析
        function renderInterestAnalysis(result, newsList, container) {
            const userInterests = result.user_interests || [];
            const keywords = result.keywords || [];

            const manager = document.getElementById('interest-manager');
            if (manager && userInterests.length > 0) {
                manager.style.display = 'block';
                renderMyInterests();
            } else if (manager) {
                manager.style.display = 'block';
                renderMyInterests();
            }

            if (userInterests.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <p style="color: #666; margin-bottom: 10px; font-weight: 600;">暂无兴趣标签</p>
                        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">从下方选择兴趣分类或手动添加</p>
                        <button onclick="toggleInterestManager()" style="padding: 8px 16px; font-size: 13px;">管理我的兴趣</button>
                    </div>
                `;
                return;
            }

            const interestMatches = userInterests.map(interest => {
                const matchCount = newsList.filter(news =>
                    news.title && news.title.includes(interest)
                ).length;
                const matchPercent = Math.min(100, Math.round((matchCount / Math.max(1, newsList.length)) * 100 * 3));
                return {
                    keyword: interest,
                    count: matchCount,
                    percent: matchPercent
                };
            }).sort((a, b) => b.count - a.count);

            let html = '<div style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px;">';
            userInterests.forEach(kw => {
                html += `<span class="word-tag" style="background: var(--terracotta); font-size: 12px;" onclick="searchByKeyword('${kw}')">⭐ ${kw}</span>`;
            });
            html += '</div>';

            html += '<div>';
            interestMatches.forEach((item, index) => {
                const barClass = item.percent >= 60 ? 'high' : item.percent >= 30 ? 'medium' : 'low';
                html += `
                    <div style="margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px;">
                            <span style="color: var(--charcoal); font-weight: 600;">${item.keyword}</span>
                            <span style="color: #666;">${item.count} 篇</span>
                        </div>
                        <div class="interest-bar" style="width: ${item.percent}%; position: relative;">
                            <div class="interest-bar-fill ${barClass}" style="width: 100%;"></div>
                            <span class="interest-bar-text">${item.percent}%</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            container.innerHTML = html;

            refreshInterestAnalysisCard();
        }

        // AI 推荐
        async function generateAIRecommendations(newsList) {
            const recommendDiv = document.getElementById('ai-recommend');
            const recommendContent = document.getElementById('recommend-content');

            if (!recommendDiv || !recommendContent) {
                console.warn('[AI 推荐] DOM 元素不存在，跳过分析');
                return;
            }

            console.log('[AI 推荐] 开始生成推荐...');

            recommendDiv.style.display = 'block';
            recommendContent.innerHTML = '<div class="ai-loading">正在生成推荐...</div>';

            try {
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        news: newsList.slice(0, 50),
                        history: userHistory.slice(-20),
                        use_external_api: true
                    })
                });

                console.log(`[AI 推荐] API 响应状态：${response.status}`);

                if (response.ok) {
                    const result = await response.json();
                    console.log(`[AI 推荐] 获取到 ${result.recommendations?.length || 0} 条推荐，来源：${result.source || 'unknown'}`);
                    renderRecommendations(result, recommendContent);
                    console.log('[AI 推荐] 渲染完成 ✅');
                } else {
                    console.error(`[AI 推荐] API 失败：${response.status}`);
                    recommendContent.innerHTML = '<p style="color: #999; font-size: 13px;">AI 推荐暂时不可用</p>';
                }
            } catch (error) {
                console.error(`[AI 推荐] 请求失败：${error.message}`);
                recommendContent.innerHTML = '<p style="color: #999; font-size: 13px;">AI 推荐暂时不可用</p>';
            }
        }

        function renderRecommendations(result, container) {
            const recommendations = result.recommendations || [];

            if (recommendations.length === 0) {
                container.innerHTML = '<p style="color: #999; font-size: 13px;">暂无个性化推荐</p>';
                return;
            }

            let html = '<div class="recommend-list">';
            recommendations.slice(0, 5).forEach((rec, index) => {
                if (!rec) return;
                const title = rec.title || '推荐内容';
                const score = rec.score || 0.9;
                const reason = rec.reason || '根据您的兴趣推荐';
                const link = rec.link || '#';
                const sourceName = rec.source_name || '';
                const newsId = rec.news_id || 'rec_' + index;

                html += `
                    <div class="recommend-item">
                        <a href="${link}" target="_blank" class="recommend-title-link" onclick="recordClick('${newsId}', '${title.replace(/'/g, "\\'")}', '${sourceName}')">
                            <span>${title}</span>
                        </a>
                        <span class="recommend-score">${score}</span>
                        <div class="recommend-reason">${reason}</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 社交分析
        async function analyzeSocial(newsList) {
            const socialDiv = document.getElementById('social-analysis');
            const socialContent = document.getElementById('social-content');

            if (!socialDiv || !socialContent) {
                console.warn('[社交分析] DOM 元素不存在，跳过分析');
                return;
            }

            console.log('[社交分析] 开始分析...');

            socialDiv.style.display = 'block';
            socialContent.innerHTML = '<div class="ai-loading">正在分析社交数据...</div>';

            try {
                const response = await fetch('/api/analyze/social', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        news: newsList.slice(0, 50),
                        use_external_api: true
                    })
                });

                console.log(`[社交分析] API 响应状态：${response.status}`);

                if (response.ok) {
                    const result = await response.json();
                    console.log(`[社交分析] 获取到指标数据：${JSON.stringify(result.metrics)}`);
                    console.log(`[社交分析] 数据来源：${result.metrics.source || 'unknown'}`);
                    renderSocialAnalysis(result, socialContent);
                    console.log('[社交分析] 渲染完成 ✅');
                } else {
                    console.error(`[社交分析] API 失败：${response.status}`);
                    socialContent.innerHTML = '<p style="color: #999; font-size: 13px;">社交分析暂时不可用</p>';
                }
            } catch (error) {
                console.error(`[社交分析] 请求失败：${error.message}`);
                socialContent.innerHTML = '<p style="color: #999; font-size: 13px;">社交分析暂时不可用</p>';
            }
        }

        function renderSocialAnalysis(result, container) {
            const metrics = result.metrics || {};
            const trends = result.trends || [];
            const viralTopics = result.viral_topics || [];

            let html = `
                <div class="social-metrics">
                    <div class="social-metric">
                        <div class="metric-value">${metrics.total_engagement || 0}</div>
                        <div class="metric-label">总互动量</div>
                    </div>
                    <div class="social-metric">
                        <div class="metric-value">${metrics.viral_count || 0}</div>
                        <div class="metric-label">病毒传播</div>
                    </div>
                    <div class="social-metric">
                        <div class="metric-value">${metrics.sentiment_score || 0}</div>
                        <div class="metric-label">情感得分</div>
                    </div>
                    <div class="social-metric">
                        <div class="metric-value">${metrics.trend_velocity || 0}</div>
                        <div class="metric-label">传播速度</div>
                    </div>
                </div>
            `;

            if (viralTopics.length > 0) {
                html += '<div class="social-trend" style="margin-top: 10px; padding: 10px; background: var(--off-white); border: 2px solid var(--charcoal); border-radius: 8px;"><strong style="color: #8B5CF6; font-size: 12px; font-weight: 700;">🔥 病毒话题</strong>';
                viralTopics.forEach((topic, index) => {
                    html += `
                        <div class="social-trend-item" style="padding: 8px 0; border-bottom: 1px dashed var(--charcoal);">
                            <span class="social-trend-name" style="font-size: 12px; font-weight: 600; color: var(--charcoal);">${index + 1}. ${topic.topic}</span>
                            <span class="trend-engagement" style="font-size: 11px; color: #666; font-weight: 600;">热度 ${topic.hot_score}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            if (trends.length > 0) {
                html += '<div class="social-trend" style="margin-top: 10px; padding: 10px; background: var(--off-white); border: 2px solid var(--charcoal); border-radius: 8px;"><strong style="color: #8B5CF6; font-size: 12px; font-weight: 700;">📈 社交趋势</strong>';
                trends.slice(0, 3).forEach(trend => {
                    html += `
                        <div class="social-trend-item" style="padding: 8px 0; border-bottom: 1px dashed var(--charcoal);">
                            <span class="social-trend-name" style="font-size: 12px; font-weight: 600; color: var(--charcoal);">${trend.topic}</span>
                            <span class="trend-engagement" style="font-size: 11px; color: #666; font-weight: 600;">${trend.engagement} 互动</span>
                        </div>
                    `;
                });
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function searchByKeyword(keyword) {
            document.getElementById('search-input').value = keyword;
            searchNews();
        }

        async function searchNews() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) {
                loadNews();
                return;
            }

            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading">正在搜索...</div>';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}&source=browser&limit=50`);
                const data = await response.json();
                const channels = [['搜索结果', 'all', data]];
                renderNewsByChannel(channels);
            } catch (error) {
                container.innerHTML = `
                    <div class="no-data">
                        <h3>⚠️ 搜索失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function analyzeWithAI(newsList) {
            if (newsList.length === 0) {
                console.warn('[AI 分析] 没有新闻数据，跳过分析');
                return;
            }

            console.log('[AI 分析] 开始深度分析...');

            const aiDiv = document.getElementById('ai-analysis');
            const aiContent = document.getElementById('ai-content');

            aiDiv.style.display = 'block';
            aiContent.innerHTML = '<div class="ai-loading">AI 正在深度分析中，请稍候...</div>';

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ news: newsList.slice(0, 20) })
                });

                console.log(`[AI 分析] API 响应状态：${response.status}`);

                if (response.ok) {
                    const result = await response.json();
                    console.log(`[AI 分析] 分析类型：${result.analysis_type}`);
                    aiContent.innerHTML = result.summary || '分析完成';

                    const badge = result.analysis_type === 'ai_deep'
                        ? '<span style="background:var(--terracotta);color:white;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;border:2px solid var(--charcoal);font-weight:700;">深度分析</span>'
                        : '<span style="background:var(--accent-yellow);color:var(--charcoal);padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;border:2px solid var(--charcoal);font-weight:700;">快速分析</span>';
                    aiDiv.querySelector('h3').innerHTML = '<svg class="icon" viewBox="0 0 24 24" style="color: var(--terracotta);"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-4.5V6h4v6.5c0 1.33-1 2.5-2.5 2.5S9 13.83 9 12.5V11h2v1.5c0 .28.22.5.5.5s.5-.22.5-.5V8h-2v2.5z" stroke="currentColor" stroke-width="2" fill="none"/></svg> AI 智能分析' + badge;
                    console.log('[AI 分析] 渲染完成 ✅');
                } else {
                    console.error(`[AI 分析] API 失败：${response.status}`);
                    const error = await response.json();
                    aiContent.innerHTML = `<div class="ai-error">分析失败：${error.error || '未知错误'}</div>`;
                }
            } catch (error) {
                console.error(`[AI 分析] 请求失败：${error.message}`);
                aiContent.innerHTML = `<div class="ai-error">请求失败：${error.message}</div>`;
            }
        }

        function filterSentiment(sentiment, btn) {
            currentFilter = sentiment;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            loadNewsWithFilter(sentiment);
        }

        async function loadNewsWithFilter(sentiment) {
            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading">正在加载新闻数据...</div>';

            try {
                const response = await fetch('/api/news/by-channel');
                const data = await response.json();

                if (sentiment === 'all') {
                    renderNewsByChannel(data);
                } else {
                    const filtered = data.map(([channel, priority, newsList]) => {
                        const filteredList = newsList.filter(n => n.sentiment === sentiment);
                        return [channel, priority, filteredList];
                    }).filter(([_, __, newsList]) => newsList.length > 0);
                    renderNewsByChannel(filtered);
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="no-data">
                        <h3>⚠️ 加载失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function renderNewsByChannel(channels) {
            const container = document.getElementById('news-container');

            if (!channels || channels.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <h3>📭 暂无数据</h3>
                        <p>还没有新闻数据，请点击"刷新"按钮采集</p>
                    </div>
                `;
                return;
            }

            let html = '';
            channels.forEach(([channelName, priority, newsList]) => {
                html += renderChannelCard(channelName, priority, newsList);
            });

            container.innerHTML = html;
        }

        function renderChannelCard(channelName, priority, newsList) {
            if (!newsList || newsList.length === 0) {
                return '';
            }

            return `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-name">
                            <span>${channelName}</span>
                        </div>
                        <div class="channel-count">${newsList.length} 条</div>
                    </div>
                    <div class="channel-news-list">
                        ${newsList.map(news => renderNewsItem(news)).join('')}
                    </div>
                </div>
            `;
        }

        function renderNewsItem(news) {
            const link = news.link || '#';
            const hasTranslation = news.lang === 'en' && news.original_title;
            const displayTitle = hasTranslation && showTranslation ? news.title : (news.original_title || news.title);
            const showOriginal = hasTranslation && !showTranslation;

            return `
                <div class="news-item">
                    <div class="news-item-content">
                        <span class="sentiment-badge sentiment-${news.sentiment || 'neutral'}">
                            ${news.sentiment || 'neutral'}
                        </span>
                        <a href="${link}" target="_blank" class="news-item-title" title="${displayTitle || ''}" onclick="recordClick(${news.news_id || 0}, '${(displayTitle || '').replace(/'/g, "\\'")}', '${news.source || ''}')">${displayTitle}</a>
                        ${hasTranslation && showTranslation ? '<span class="trans-badge">译</span>' : ''}
                    </div>
                    <div class="news-item-meta">
                        <span class="news-item-date">${formatPublishedTime(news.published)}</span>
                    </div>
                </div>
            `;
        }

        function formatPublishedTime(published) {
            if (!published) return '';
            try {
                const parts = published.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
                if (!parts) return published;

                const date = new Date(
                    parseInt(parts[1]),
                    parseInt(parts[2]) - 1,
                    parseInt(parts[3]),
                    parseInt(parts[4]),
                    parseInt(parts[5]),
                    parseInt(parts[6])
                );

                const now = new Date();
                const diff = (now - date) / 1000;

                if (diff < 60) return '刚刚';
                if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
                if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
                return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            } catch (e) {
                return published;
            }
        }

        function toggleTranslation() {
            showTranslation = document.getElementById('translate-toggle').checked;
            loadNews();
        }

        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchNews();
            }
        });
    </script>
