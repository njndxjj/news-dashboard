<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户兴趣图谱 - ECharts 可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"], input[type="password"] {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            width: 200px;
        }

        input[type="text"]::placeholder, input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #interestChart {
            width: 100%;
            height: 600px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .stat-value {
            font-weight: 600;
            color: #fff;
        }

        .interest-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .interest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s;
        }

        .interest-item:hover {
            background: rgba(255, 255, 255, 0.05);
            padding-left: 8px;
            margin-left: -8px;
            border-radius: 4px;
        }

        .interest-name {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .interest-weight {
            font-size: 12px;
            color: #4CAF50;
            font-weight: 600;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 600px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 用户兴趣图谱</h1>
            <div class="controls">
                <div class="user-selector">
                    <input type="text" id="userIdInput" placeholder="输入用户 ID" value="default">
                    <button class="btn-primary" onclick="loadInterestGraph()">加载图谱</button>
                </div>
                <button class="btn-secondary" id="refreshBtn" onclick="refreshData()">🔄 刷新</button>
                <button class="btn-secondary" id="decayBtn" onclick="applyDecay()">⏳ 应用衰减</button>
            </div>
        </header>

        <div class="main-content">
            <div class="chart-container">
                <div id="chartWrapper">
                    <div class="loading">加载中...</div>
                </div>
                <div id="interestChart"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3>📊 图谱统计</h3>
                    <div class="stat-item">
                        <span class="stat-label">兴趣节点数</span>
                        <span class="stat-value" id="nodeCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">关系边数</span>
                        <span class="stat-value" id="edgeCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">平均权重</span>
                        <span class="stat-value" id="avgWeight">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">最强兴趣</span>
                        <span class="stat-value" id="topInterest">-</span>
                    </div>
                </div>

                <div class="panel">
                    <h3>🔥 兴趣排行</h3>
                    <div class="interest-list" id="interestList">
                        <div class="empty-state">暂无数据</div>
                    </div>
                </div>

                <div class="panel">
                    <h3>📋 图例</h3>
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background: #4CAF50;"></div>
                            <span>用户</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #2196F3;"></div>
                            <span>关键词</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #FF9800;"></div>
                            <span>话题</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #9C27B0;"></div>
                            <span>分类</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #F44336;"></div>
                            <span>新闻</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #00BCD4;"></div>
                            <span>来源</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart = null;
        let graphData = null;

        // 初始化 ECharts
        function initChart() {
            const chartDom = document.getElementById('interestChart');
            chart = echarts.init(chartDom, 'dark', {
                renderer: 'canvas',
                devicePixelRatio: window.devicePixelRatio
            });

            window.addEventListener('resize', () => {
                chart.resize();
            });
        }

        // 加载兴趣图谱
        async function loadInterestGraph() {
            const userId = document.getElementById('userIdInput').value.trim() || 'default';
            const chartWrapper = document.getElementById('chartWrapper');
            const chartDom = document.getElementById('interestChart');

            chartWrapper.style.display = 'block';
            chartDom.style.display = 'none';
            chartWrapper.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`/api/user/interest-graph/network?user_id=${encodeURIComponent(userId)}`);
                const data = await response.json();

                if (data.nodes && data.nodes.length > 0) {
                    graphData = data;
                    renderChart(data);
                    updateStats(data);
                    updateInterestList(data);

                    chartWrapper.style.display = 'none';
                    chartDom.style.display = 'block';
                } else {
                    chartWrapper.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                            <p>暂无兴趣数据</p>
                            <p style="font-size: 12px; margin-top: 10px;">用户的行为将自动生成兴趣图谱</p>
                        </div>
                    `;
                    chartDom.style.display = 'none';
                }
            } catch (error) {
                console.error('加载失败:', error);
                chartWrapper.innerHTML = `
                    <div class="empty-state">
                        <p style="color: #F44336;">加载失败</p>
                        <p style="font-size: 12px; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // 渲染图谱
        function renderChart(data) {
            const nodes = data.nodes.map(node => ({
                ...node,
                symbolSize: node.size || 20,
                draggable: true,
                label: {
                    show: true,
                    position: 'right',
                    color: '#fff',
                    fontSize: 12,
                    formatter: (params) => {
                        const maxLen = 10;
                        return params.name.length > maxLen
                            ? params.name.substring(0, maxLen) + '...'
                            : params.name;
                    }
                },
                emphasis: {
                    focus: 'adjacency',
                    label: {
                        show: true,
                        fontSize: 14,
                        fontWeight: 'bold'
                    }
                }
            }));

            const links = data.links.map(link => ({
                ...link,
                lineStyle: {
                    width: Math.min(Math.max(link.weight || 1, 1), 8),
                    curveness: 0.1,
                    opacity: 0.6
                }
            }));

            const categories = [
                { name: '用户' },
                { name: '关键词' },
                { name: '话题' },
                { name: '分类' },
                { name: '新闻' },
                { name: '来源' }
            ];

            const option = {
                title: {
                    text: '',
                    left: 'center',
                    top: 10
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    borderColor: 'rgba(255, 255, 255, 0.2)',
                    textStyle: {
                        color: '#fff'
                    },
                    formatter: (params) => {
                        if (params.dataType === 'node') {
                            return `
                                <div style="padding: 8px;">
                                    <div style="font-weight: bold; font-size: 14px; margin-bottom: 6px;">${params.name}</div>
                                    <div style="font-size: 12px; color: rgba(255,255,255,0.7);">类型：${params.type || '未知'}</div>
                                    ${params.weight ? `<div style="font-size: 12px; color: #4CAF50; margin-top: 4px;">权重：${params.weight.toFixed(2)}</div>` : ''}
                                </div>
                            `;
                        } else {
                            return `
                                <div style="padding: 8px;">
                                    <div style="font-weight: bold; font-size: 14px;">${params.source} → ${params.target}</div>
                                    <div style="font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px;">关系：${params.relation}</div>
                                    <div style="font-size: 12px; color: #4CAF50; margin-top: 4px;">权重：${(params.weight || 0).toFixed(2)}</div>
                                </div>
                            `;
                        }
                    }
                },
                legend: [{
                    data: categories.map(c => c.name),
                    textStyle: {
                        color: 'rgba(255, 255, 255, 0.7)'
                    },
                    bottom: 10,
                    left: 'center'
                }],
                animationDuration: 1000,
                animationEasing: 'cubicOut',
                series: [
                    {
                        type: 'graph',
                        layout: 'force',
                        data: nodes,
                        links: links,
                        categories: categories,
                        roam: true,
                        label: {
                            show: true,
                            position: 'right',
                            color: '#fff'
                        },
                        force: {
                            repulsion: 300,
                            edgeLength: [50, 200],
                            gravity: 0.1
                        },
                        lineStyle: {
                            color: 'source',
                            curveness: 0.1,
                            width: 1,
                            opacity: 0.5
                        },
                        emphasis: {
                            focus: 'adjacency',
                            lineStyle: {
                                width: 10
                            }
                        }
                    }
                ]
            };

            chart.setOption(option);

            // 点击节点事件
            chart.on('click', (params) => {
                if (params.dataType === 'node') {
                    console.log('点击节点:', params.name, params.data);
                    // 可以在这里添加节点详情面板
                }
            });
        }

        // 更新统计信息
        function updateStats(data) {
            const nodeCount = data.nodes?.length || 0;
            const edgeCount = data.links?.length || 0;

            const weights = data.nodes
                .filter(n => n.weight)
                .map(n => n.weight);
            const avgWeight = weights.length > 0
                ? (weights.reduce((a, b) => a + b, 0) / weights.length).toFixed(2)
                : 0;

            const topInterest = data.nodes
                .filter(n => n.type === 'keyword' && n.weight)
                .sort((a, b) => b.weight - a.weight)[0];

            document.getElementById('nodeCount').textContent = nodeCount;
            document.getElementById('edgeCount').textContent = edgeCount;
            document.getElementById('avgWeight').textContent = avgWeight;
            document.getElementById('topInterest').textContent = topInterest ? topInterest.label : '-';
        }

        // 更新兴趣列表
        function updateInterestList(data) {
            const keywords = data.nodes
                .filter(n => n.type === 'keyword' && n.weight)
                .sort((a, b) => b.weight - a.weight)
                .slice(0, 10);

            const listContainer = document.getElementById('interestList');

            if (keywords.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            listContainer.innerHTML = keywords.map((item, index) => `
                <div class="interest-item" onclick="focusNode('${item.id}')">
                    <span class="interest-name">${index + 1}. ${item.label}</span>
                    <span class="interest-weight">${item.weight.toFixed(2)}</span>
                </div>
            `).join('');
        }

        // 聚焦节点
        function focusNode(nodeId) {
            if (chart && graphData) {
                const node = graphData.nodes.find(n => n.id === nodeId);
                if (node) {
                    chart.dispatchAction({
                        type: 'focusNodeAdjacency',
                        seriesIndex: 0,
                        dataIndex: graphData.nodes.findIndex(n => n.id === nodeId)
                    });
                }
            }
        }

        // 刷新数据
        function refreshData() {
            loadInterestGraph();
        }

        // 应用时间衰减
        async function applyDecay() {
            const userId = document.getElementById('userIdInput').value.trim() || 'default';

            try {
                const response = await fetch('/api/user/interest-graph/decay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_id: userId })
                });

                const result = await response.json();

                if (result.success) {
                    alert(`已应用时间衰减，影响 ${result.affected || 0} 条记录`);
                    loadInterestGraph();
                } else {
                    alert('应用衰减失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('应用衰减失败:', error);
                alert('应用衰减失败：' + error.message);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            loadInterestGraph(); // 直接加载兴趣图谱

            // 支持回车键加载
            document.getElementById('userIdInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loadInterestGraph();
                }
            });
        });
    </script>
</body>
</html>
