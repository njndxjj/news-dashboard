<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户行为分析 - Lumos</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }

        .stat-change.positive {
            color: #4CAF50;
        }

        .stat-change.negative {
            color: #F44336;
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            height: 400px;
        }

        /* 排行榜 */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .ranking-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
        }

        .ranking-rank.gold {
            background: linear-gradient(90deg, #FFD700, #FFA500);
        }

        .ranking-rank.silver {
            background: linear-gradient(90deg, #C0C0C0, #A8A8A8);
        }

        .ranking-rank.bronze {
            background: linear-gradient(90deg, #CD7F32, #B87333);
        }

        .ranking-name {
            flex: 1;
            font-size: 14px;
        }

        .ranking-value {
            font-weight: 600;
            color: #4CAF50;
        }

        /* 用户列表 */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-stats {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .user-actions {
            font-size: 12px;
            color: #4CAF50;
            font-weight: 600;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: rgba(255, 255, 255, 0.5);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(76, 175, 80, 0.2);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 登录弹窗样式 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-modal h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            width: 100%;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .login-btn {
            padding: 14px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #F44336;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        .user-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .user-details {
            flex: 1;
        }

        .user-name-bar {
            font-size: 14px;
            font-weight: 600;
        }

        .user-role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .logout-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- 登录弹窗 -->
    <div id="loginOverlay" class="login-overlay" style="display: none;">
        <div class="login-modal">
            <h2>🔐 管理员登录</h2>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <div class="form-group" id="captchaGroup" style="display: none;">
                    <label for="captcha">验证码（4 位数字）</label>
                    <input type="text" id="captcha" name="captcha" placeholder="请输入验证码" maxlength="4" pattern="[0-9]{4}" inputmode="numeric">
                    <small style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 4px;">超管用户需要验证码，默认：8888</small>
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="login-btn" id="loginBtn">登录</button>
            </form>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>📊 用户行为分析</h1>
            <div class="controls">
                <div id="userInfo" style="display: none;">
                    <div class="user-info-bar">
                        <div class="user-avatar-small" id="userAvatar">A</div>
                        <div class="user-details">
                            <div class="user-name-bar" id="userName">Admin</div>
                            <div class="user-role">管理员</div>
                        </div>
                        <button class="logout-btn" onclick="logout()">退出</button>
                    </div>
                </div>
                <button id="loginBtnHeader" class="btn-primary" onclick="showLogin()" style="display: none;">🔐 登录</button>
                <button class="btn-secondary" onclick="refreshData()">🔄 刷新</button>
                <button class="btn-secondary" onclick="exportData()">📥 导出</button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">活跃用户数</div>
                <div class="stat-value" id="activeUsers">-</div>
                <div class="stat-change positive" id="activeUsersChange">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-label">今日行为数</div>
                <div class="stat-value" id="todayActions">-</div>
                <div class="stat-change positive" id="todayActionsChange">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-label">热门兴趣 TOP3</div>
                <div class="stat-value" id="topInterests">-</div>
                <div class="stat-change" id="topInterestsChange">实时更新</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-label">用户留存率</div>
                <div class="stat-value" id="retentionRate">-</div>
                <div class="stat-change negative" id="retentionRateChange">--</div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="panel">
                <h2>📊 行为趋势</h2>
                <div id="trendChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="panel">
                <h2>🔥 热门兴趣排行</h2>
                <div id="interestRanking" class="ranking-list">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户列表和分布 -->
        <div class="main-content">
            <div class="panel">
                <h2>👥 活跃用户</h2>
                <div id="userList" class="user-list">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
            <div class="panel">
                <h2>🎯 兴趣分布</h2>
                <div id="distributionChart" class="chart-container">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let trendChart = null;
        let distributionChart = null;

        // 初始化图表
        function initCharts() {
            const trendDom = document.getElementById('trendChart');
            const distributionDom = document.getElementById('distributionChart');

            trendChart = echarts.init(trendDom, 'dark', { renderer: 'canvas' });
            distributionChart = echarts.init(distributionDom, 'dark', { renderer: 'canvas' });

            window.addEventListener('resize', () => {
                trendChart.resize();
                distributionChart.resize();
            });
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/user/behavior/stats/global');
                const data = await response.json();

                if (data.success) {
                    const stats = data.stats;
                    document.getElementById('activeUsers').textContent = stats.active_users || 0;
                    document.getElementById('todayActions').textContent = stats.today_actions || 0;
                    document.getElementById('retentionRate').textContent = (stats.retention_rate || 0) + '%';

                    // 热门兴趣
                    if (stats.top_interests && stats.top_interests.length > 0) {
                        const top3 = stats.top_interests.slice(0, 3).map(i => i.keyword).join(', ');
                        document.getElementById('topInterests').textContent = top3 || '-';
                    }
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载行为趋势
        async function loadTrendData() {
            try {
                const response = await fetch('/api/user/behavior/trend?days=7');
                const data = await response.json();

                if (data.success && data.chart_data) {
                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            textStyle: { color: '#fff' }
                        },
                        legend: {
                            data: ['点击', '浏览', '搜索', '收藏'],
                            textStyle: { color: 'rgba(255, 255, 255, 0.7)' },
                            bottom: 10
                        },
                        grid: {
                            left: '3%',
                            right: '4%',
                            bottom: '10%',
                            containLabel: true
                        },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: data.chart_data.dates || [],
                            axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
                            axisLabel: { color: 'rgba(255, 255, 255, 0.7)' }
                        },
                        yAxis: {
                            type: 'value',
                            axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
                            axisLabel: { color: 'rgba(255, 255, 255, 0.7)' },
                            splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
                        },
                        series: data.chart_data.series || []
                    };

                    trendChart.setOption(option);
                }
            } catch (error) {
                console.error('加载趋势数据失败:', error);
                document.getElementById('trendChart').innerHTML = '<div class="empty-state">数据加载失败</div>';
            }
        }

        // 加载兴趣排行
        async function loadInterestRanking() {
            try {
                const response = await fetch('/api/user/interests/categories');
                const data = await response.json();

                if (data.success && data.categories && data.categories.length > 0) {
                    const sorted = data.categories.sort((a, b) => b.count - a.count).slice(0, 10);
                    const html = sorted.map((item, index) => {
                        let rankClass = '';
                        if (index === 0) rankClass = 'gold';
                        else if (index === 1) rankClass = 'silver';
                        else if (index === 2) rankClass = 'bronze';

                        return `
                            <div class="ranking-item">
                                <div class="ranking-rank ${rankClass}">${index + 1}</div>
                                <div class="ranking-name">${item.name}</div>
                                <div class="ranking-value">${item.count} 人</div>
                            </div>
                        `;
                    }).join('');
                    document.getElementById('interestRanking').innerHTML = html;
                } else {
                    document.getElementById('interestRanking').innerHTML = '<div class="empty-state">暂无数据</div>';
                }
            } catch (error) {
                console.error('加载兴趣排行失败:', error);
                document.getElementById('interestRanking').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载用户列表
        async function loadUserList() {
            try {
                // 使用全局统计 API 获取活跃用户信息
                const response = await fetch('/api/user/behavior/stats/global');
                const data = await response.json();

                if (data.success) {
                    // 如果有用户列表数据
                    if (data.stats.active_users_list && data.stats.active_users_list.length > 0) {
                        const users = data.stats.active_users_list.slice(0, 10);
                        const html = users.map(user => `
                            <div class="user-item" onclick="viewUser('${user.user_id}')">
                                <div class="user-avatar">${(user.name || user.user_id || 'U').charAt(0).toUpperCase()}</div>
                                <div class="user-info">
                                    <div class="user-name">${user.name || '用户 ' + user.user_id}</div>
                                    <div class="user-stats">${user.action_count || 0} 次行为 · ${user.interests_count || 0} 个兴趣</div>
                                </div>
                                <div class="user-actions">查看详情 ›</div>
                            </div>
                        `).join('');
                        document.getElementById('userList').innerHTML = html;
                    } else {
                        document.getElementById('userList').innerHTML = '<div class="empty-state">暂无活跃用户</div>';
                    }
                }
            } catch (error) {
                console.error('加载用户列表失败:', error);
                document.getElementById('userList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 加载兴趣分布
        async function loadDistributionData() {
            try {
                const response = await fetch('/api/user/interests/categories');
                const data = await response.json();

                if (data.success && data.categories && data.categories.length > 0) {
                    const sorted = data.categories.sort((a, b) => b.count - a.count).slice(0, 8);

                    const option = {
                        tooltip: {
                            trigger: 'item',
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            textStyle: { color: '#fff' }
                        },
                        legend: {
                            orient: 'vertical',
                            right: 10,
                            top: 'center',
                            textStyle: { color: 'rgba(255, 255, 255, 0.7)' }
                        },
                        series: [
                            {
                                type: 'pie',
                                radius: ['40%', '70%'],
                                center: ['35%', '50%'],
                                avoidLabelOverlap: false,
                                itemStyle: {
                                    borderRadius: 10,
                                    borderColor: 'rgba(26, 26, 46, 0.5)',
                                    borderWidth: 2
                                },
                                label: {
                                    show: false,
                                    position: 'center'
                                },
                                emphasis: {
                                    label: {
                                        show: true,
                                        fontSize: 18,
                                        fontWeight: 'bold',
                                        color: '#fff'
                                    }
                                },
                                labelLine: {
                                    show: false
                                },
                                data: sorted.map(item => ({
                                    value: item.count,
                                    name: item.name
                                }))
                            }
                        ]
                    };

                    distributionChart.setOption(option);
                } else {
                    document.getElementById('distributionChart').innerHTML = '<div class="empty-state">暂无数据</div>';
                }
            } catch (error) {
                console.error('加载分布数据失败:', error);
                document.getElementById('distributionChart').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 刷新数据
        function refreshData() {
            loadStats();
            loadTrendData();
            loadInterestRanking();
            loadUserList();
            loadDistributionData();
        }

        // 导出数据
        function exportData() {
            alert('导出功能开发中...');
        }

        // 查看用户详情
        function viewUser(userId) {
            window.open('/interest-graph?user_id=' + encodeURIComponent(userId), '_blank');
        }

        // ==================== 管理员登录逻辑 ====================
        let currentUser = null;

        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/admin/check');
                const data = await response.json();

                if (data.is_admin) {
                    currentUser = data;
                    showLoggedInUI(data);
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('loginBtnHeader').style.display = 'none';
        }

        function hideLogin() {
            document.getElementById('loginOverlay').style.display = 'none';
        }

        function showLoggedInUI(user) {
            hideLogin();
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').textContent = user.name || user.username;
            document.getElementById('userAvatar').textContent = (user.name || user.username).charAt(0).toUpperCase();
            refreshData();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorDiv.style.display = 'none';

            try {
                const requestBody = { username, password };
                if (captcha) {
                    requestBody.captcha = captcha;
                }

                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    currentUser = data;
                    showLoggedInUI(data);
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('captcha').value = '';
                } else if (response.status === 403 && data.captcha_required) {
                    document.getElementById('captchaGroup').style.display = 'flex';
                    document.getElementById('captcha').focus();
                    errorDiv.textContent = data.error || '需要验证码';
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = data.error || '登录失败';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '登录失败：' + error.message;
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        async function logout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
                currentUser = null;
                showLogin();
            } catch (error) {
                console.error('登出失败:', error);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            checkAdminStatus();
        });
    </script>
</body>
</html>
