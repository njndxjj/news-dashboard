# ==================== 管理员权限配置 ====================
admin:
  # 管理员 Token 列表（可以设置多个，用于 API 访问权限控制）
  # 生成方式：可以用 uuidgen 命令生成，或者随机字符串
  # 只有持有有效 token 的用户才能访问管理员功能（如用户兴趣图谱）
  tokens:
    - "admin-token-change-me-please"  # 默认 token，请修改！

  # 管理员用户列表（用于前端登录）
  # password 是明文（简单起见），生产环境可以用 hashlib.sha256 加密
  # captcha_enabled: 是否启用验证码（默认 true）
  # captcha_code: 验证码（4 位数字，可自定义）
  users:
    - username: "admin"
      password: "admin123"
      token: "admin-token-change-me-please"
      name: "系统管理员"
      captcha_enabled: true  # 是否启用验证码（超管专用）
      captcha_code: "8888"   # 验证码（4 位数字，可自定义）
