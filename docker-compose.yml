services:
  news-monitor:
    image: news-monitor-with-cron:latest
    container_name: news-monitor-app
    ports:
      - "5000:5000"
    volumes:
      # 数据持久化（重要：保存数据库和缓存）
      - ./data:/app/data
      # 挂载 supervisor socket 便于调试
      - /var/run/supervisor:/var/run/supervisor
    restart: unless-stopped
    # 使用 supervisord 启动 cron 和 Flask
    command: ["supervisord", "-n", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    environment:
      - PYTHONUNBUFFERED=1
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - FEISHU_WEBHOOK=${FEISHU_WEBHOOK:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/news"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制（可选，防止内存占用过高）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
